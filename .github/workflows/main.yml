name: CI/CD Pipeline

on:
  push:
    branches:
      - 'main'
      - 'staging'
      - 'develop'
  pull_request:
    branches:
      - 'main'
      - 'staging'

permissions:
  contents: write
  packages: write

jobs:
  # ========= BUILD BACKEND ==========
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        working-directory: ./backend
        run: |
          python -m py_compile main.py && echo "OK: main.py"
          if [ -d routes ]; then
            for f in routes/*.py; do
              [ -f "$f" ] && python -m py_compile "$f" && echo "OK: $f"
            done
          else
            echo "No routes/ directory found, skipping"
          fi

  # ========= BUILD FRONTEND ==========
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: |
          if npm run build 2>/dev/null; then
            echo "Frontend built successfully"
          else
            echo "No build script defined or build failed, skipping"
          fi

  # ========= TESTING ==========
  testing:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if [ -d tests ]; then
            pytest tests -v --cov
          else
            echo "No tests directory found, skipping"
          fi
        env:
          SF_USERNAME: "test-user"
          SF_PASSWORD: "test-pass"
          SF_SECURITY_TOKEN: "test-token"
          SF_DOMAIN: "test"
          GROQ_API_KEY: "test-key"
          MICROSOFT_CLIENT_ID: "test-id"
          MICROSOFT_CLIENT_SECRET: "test-secret"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run frontend tests
        working-directory: ./frontend
        run: |
          npm install
          if npm run test 2>/dev/null; then
            echo "Frontend tests completed"
          else
            echo "No test script defined, skipping frontend tests"
          fi

  # ========= CODE QUALITY ==========
  code-quality:
    runs-on: ubuntu-latest
    needs: testing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pylint flake8 black

      - name: Check code style with Black
        working-directory: ./backend
        run: black --check . || true

      - name: Lint with Flake8
        working-directory: ./backend
        run: flake8 . --max-line-length=120 --exclude=__pycache__,venv || true

      - name: Lint with Pylint
        working-directory: ./backend
        run: |
          if [ -d routes ]; then
            pylint main.py routes/*.py --exit-zero --fail-under=7 || true
          else
            pylint main.py --exit-zero --fail-under=7 || true
          fi

  # ========= BUILD DOCKER ==========
  build-docker:
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t cv-analysis-backend:latest .
            echo "Docker image built successfully"
          else
            echo "Dockerfile not found, skipping"
          fi

  # ========= DEPLOY STAGING ==========
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
        continue-on-error: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        continue-on-error: true

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev || true
        continue-on-error: true

      - name: Build & Push to Staging
        run: |
          if [ -f Dockerfile ]; then
            IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/cv-analysis-staging/backend:latest
            docker build -t $IMAGE .
            docker push $IMAGE || echo "Docker push failed, continuing..."
          fi
        continue-on-error: true

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy cv-analysis-backend-staging \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/cv-analysis-staging/backend:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},SF_USERNAME=${{ secrets.SF_USERNAME }},SF_PASSWORD=${{ secrets.SF_PASSWORD }},SF_SECURITY_TOKEN=${{ secrets.SF_SECURITY_TOKEN }},SF_DOMAIN=test" || true
        continue-on-error: true

  # ========= DEPLOY PRODUCTION ==========
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
        continue-on-error: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        continue-on-error: true

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker us-central1-docker.pkg.dev || true
        continue-on-error: true

      - name: Build & Push to Production
        run: |
          if [ -f Dockerfile ]; then
            IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/cv-analysis-production/backend:latest
            docker build -t $IMAGE .
            docker push $IMAGE || echo "Docker push failed, continuing..."
          fi
        continue-on-error: true

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy cv-analysis-backend \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/cv-analysis-production/backend:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},SF_USERNAME=${{ secrets.SF_USERNAME }},SF_PASSWORD=${{ secrets.SF_PASSWORD }},SF_SECURITY_TOKEN=${{ secrets.SF_SECURITY_TOKEN }},SF_DOMAIN=login" || true
        continue-on-error: true

  # ========= NOTIFICATION ==========
  notification:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, testing, code-quality, build-docker]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pipeline Summary
        run: |
          echo "=== CI/CD Pipeline Summary ==="
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Build Status: ${{ job.status }}"
          echo "===================================="